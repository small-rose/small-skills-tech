name: Validate SKILLs

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'case-studies/**'
      - 'templates/**'
      - '.github/workflows/validate.yml'
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'case-studies/**'
      - 'templates/**'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        run: |
          echo "=== Validating SKILL.md files ==="
          has_error=0
          for skill in skills/*/; do
            skillmd="${skill}SKILL.md"
            if [ ! -f "$skillmd" ]; then
              echo "❌ Missing SKILL.md in ${skill}"
              has_error=1
              continue
            fi

            # Check required frontmatter fields
            name=$(head -20 "$skillmd" | grep "^name: ")
            desc=$(head -20 "$skillmd" | grep "^description: ")
            trig=$(head -20 "$skillmd" | grep "^triggers:")

            missing=""
            [ -z "$name" ] && missing="$missing name"
            [ -z "$desc" ] && missing="$missing description"
            [ -z "$trig" ] && missing="$missing triggers"

            if [ -n "$missing" ]; then
              echo "❌ ${skillmd} missing required fields:${missing}"
              has_error=1
            else
              skill_name=$(echo "$name" | sed 's/^name: *//')
              echo "✅ ${skill_name} — frontmatter OK"
            fi
          done
          if [ "$has_error" -eq 1 ]; then
            echo "---"
            echo "Validation FAILED."
            exit 1
          fi
          echo "=== All skills validated successfully. ==="
